<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Panel</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                900: '#1e3a8a',
              }
            }
          }
        }
      }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex h-screen overflow-hidden text-sm">

    <!-- Sidebar -->
    <aside class="flex-shrink-0 w-64 bg-slate-900 border-r border-slate-800 flex flex-col transition-all duration-300">
        <!-- Sidebar Header -->
        <div class="h-16 flex items-center px-6 border-b border-slate-800">
            <a href="/" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
                    <i class="fa fa-briefcase text-white"></i>
                </div>
                <span class="text-white font-bold text-lg tracking-tight">Admin Panel</span>
            </a>
        </div>

        <!-- Sidebar Navigation -->
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a href="/dashboard/" class="{% if request.path == '/dashboard/' %}bg-slate-800 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group font-medium">
                <i class="fa fa-home w-5 text-center group-hover:text-primary-500 transition-colors {% if request.path == '/dashboard/' %}text-primary-500{% endif %}"></i>
                Dashboard Overview
            </a>
            
            <a href="/dashboard/jobs/" class="{% if '/jobs/' in request.path and 'add' not in request.path %}bg-slate-800 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group font-medium">
                <i class="fa fa-list-alt w-5 text-center group-hover:text-primary-500 transition-colors {% if '/jobs/' in request.path and 'add' not in request.path %}text-primary-500{% endif %}"></i>
                Manage Jobs
            </a>
            
            <a href="/dashboard/jobs/add/" class="{% if '/add/' in request.path %}bg-slate-800 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group font-medium">
                <i class="fa fa-plus-circle w-5 text-center group-hover:text-primary-500 transition-colors {% if '/add/' in request.path %}text-primary-500{% endif %}"></i>
                Add New Job
            </a>
            
            <a href="/dashboard/applications/" class="{% if '/applications/' in request.path %}bg-slate-800 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group font-medium">
                <i class="fa fa-file-contract w-5 text-center group-hover:text-primary-500 transition-colors {% if '/applications/' in request.path %}text-primary-500{% endif %}"></i>
                Manage Applications
            </a>
            
            {% if request.user.is_superuser %}
            <a href="/dashboard/users/" class="{% if '/users/' in request.path %}bg-slate-800 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-white{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group font-medium">
                <i class="fa fa-users w-5 text-center group-hover:text-primary-500 transition-colors {% if '/users/' in request.path %}text-primary-500{% endif %}"></i>
                Manage Users
            </a>
            {% endif %}
        </nav>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-slate-800">
            <a href="/logout/" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-red-500/10 hover:text-red-500 transition-all duration-200 group font-medium">
                <i class="fa fa-sign-out-alt w-5 text-center group-hover:text-red-500"></i>
                Secure Logout
            </a>
        </div>
    </aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50/50">
        <!-- Top Navigation Bar -->
        <header class="h-16 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
            <div class="flex items-center text-gray-500">
                <i class="fa fa-bars cursor-pointer hover:text-gray-900 transition-colors hidden sm:block"></i>
                <span class="ml-4 font-semibold text-gray-700 hidden sm:block">Control Panel</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/" target="_blank" class="text-sm font-medium text-primary-600 hover:text-primary-800 flex items-center gap-2">
                    <i class="fa fa-external-link-alt"></i> View Site
                </a>
                <div class="w-px h-6 bg-gray-200 mx-2"></div>
                <div class="flex items-center gap-3 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200">
                    <div class="w-8 h-8 rounded-full bg-primary-600 text-white flex items-center justify-center font-bold">
                        A
                    </div>
                    <span class="font-semibold text-gray-700 pr-2">{% if request.user.is_superuser %}Admin{% else %}Employer{% endif %}</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-8 relative">
            <div class="max-w-6xl mx-auto space-y-6">
                <!-- 🔥 DYNAMIC CONTENT HERE -->
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

</body>
</html>
