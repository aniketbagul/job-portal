{% extends 'dashboard/base.html' %}

{% block content %}

<div class="mb-8">
    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight flex items-center">
        <div class="w-10 h-10 bg-primary-100 text-primary-600 rounded-lg flex items-center justify-center mr-3 shadow-sm border border-primary-200">
            <i class="fa fa-plus"></i>
        </div>
        Post New Job
    </h1>
    <p class="mt-2 text-gray-500">Fill in the details below to create a new job listing.</p>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="p-8">
        <form method="POST" enctype="multipart/form-data" class="space-y-8">
            {% csrf_token %}

            <!-- Section 1: Basic Details -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4 pb-2 border-b border-gray-100">1. Basic Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Company Name</label>
                        <input type="text" name="company" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="e.g. Acme Corp" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Job Title</label>
                        <input type="text" name="title" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="e.g. Senior Frontend Engineer" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Role / Department</label>
                        <input type="text" name="role" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="e.g. Engineering" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Location</label>
                        <select name="location" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white appearance-none" required>
                            <option value="" disabled selected>Select location</option>
                            <option>Mumbai</option>
                            <option>Pune</option>
                            <option>Bangalore</option>
                            <option>Remote</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Section 2: Details & Compensation -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4 pb-2 border-b border-gray-100">2. Description & Compensation</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Contract Type</label>
                        <select name="contract" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white appearance-none" required>
                            <option value="" disabled selected>Select contract</option>
                            <option>Full Time</option>
                            <option>Part Time</option>
                            <option>Freelance</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Salary ($ p.a.)</label>
                        <input type="text" name="salary" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="e.g. 120000" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Vacancies</label>
                        <input type="number" name="vacancy" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="e.g. 3" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Experience Required</label>
                        <input type="text" name="experience" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="e.g. 3-5 Years" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Application Deadline</label>
                        <input type="datetime-local" name="deadline" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" required>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Job Description</label>
                        <textarea name="description" rows="5" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="Detailed description of responsibilities and requirements..." required></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">About the Company</label>
                        <textarea name="about" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors bg-gray-50 hover:bg-white" placeholder="Brief paragraph about company culture and mission..." required></textarea>
                    </div>
                </div>
            </div>

            <!-- Section 3: Media -->
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-4 pb-2 border-b border-gray-100">3. Media</h3>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Main Job Image / Header</label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-primary-400 hover:bg-primary-50 transition-all duration-300 group cursor-pointer bg-gray-50" onclick="document.getElementById('image-upload').click()">
                        <div class="space-y-1 text-center">
                            <i class="fa fa-image text-4xl text-gray-400 group-hover:text-primary-500 mb-2 transition-colors"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label for="image-upload" class="relative cursor-pointer rounded-md font-medium text-primary-600 hover:text-primary-500 focus-within:outline-none">
                                    <span>Upload an image</span>
                                    <input id="image-upload" name="main_image" type="file" class="sr-only" accept="image/*" onchange="document.getElementById('img-file-name').textContent = this.files[0].name" required>
                                </label>
                            </div>
                            <p class="text-xs text-gray-500">PNG, JPG, WEBP up to 5MB</p>
                            <p id="img-file-name" class="text-sm font-semibold text-primary-600 mt-2"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-100 flex justify-end gap-4 mt-8">
                <a href="/dashboard/jobs/" class="px-6 py-3 border border-gray-300 rounded-xl text-gray-700 font-bold hover:bg-gray-50 transition-colors shadow-sm">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-primary-600 text-white font-bold rounded-xl shadow-md hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-transform transform hover:-translate-y-0.5">
                    Save and Publish Job
                </button>
            </div>
            
        </form>
    </div>
</div>

{% endblock %}
