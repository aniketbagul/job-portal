{% extends 'base.html' %}
{% block title %} Account Login {% endblock %}
{% load static %}

{% block content %}

<section class="min-h-[85vh] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 relative">
    <!-- Abstract Background Pattern -->
    <div class="absolute inset-0 z-0 overflow-hidden">
        <svg class="absolute left-[max(50%,25rem)] top-0 h-[64rem] w-[128rem] -translate-x-1/2 stroke-gray-200 [mask-image:radial-gradient(64rem_64rem_at_top,white,transparent)]" aria-hidden="true">
            <defs>
                <pattern id="e81e5f09-e363-4129-9528-5561b62b0613" width="200" height="200" x="50%" y="-1" patternUnits="userSpaceOnUse">
                    <path d="M100 200V.5M.5 .5H200" fill="none" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" stroke-width="0" fill="url(#e81e5f09-e363-4129-9528-5561b62b0613)" />
        </svg>
    </div>

    <div class="relative z-10 w-full max-w-md">
        
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-primary-100 flex items-center justify-center rounded-full mb-4 shadow-sm">
                <i class="fa fa-user-circle text-primary-600 text-3xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Sign in to your account</h2>
            <p class="mt-2 text-sm text-gray-600">
                Or
                <a href="{% url 'register' %}" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">
                    create a new account
                </a>
            </p>
        </div>

        <div class="bg-white py-8 px-6 sm:px-10 shadow-[0_8px_30px_rgb(0,0,0,0.08)] rounded-2xl border border-gray-100">
            {% include 'partials/_alerts.html' %}

            <form action="{% url 'login' %}" method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-700">Email address</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" name="email" class="focus:ring-primary-500 focus:border-primary-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-2.5 bg-gray-50 hover:bg-white transition-colors" placeholder="you@example.com" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" name="password" class="focus:ring-primary-500 focus:border-primary-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-2.5 bg-gray-50 hover:bg-white transition-colors" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-primary-600 hover:text-primary-500">
                            Forgot password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-transform transform hover:-translate-y-0.5">
                        Sign in
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</section>

{% endblock %}
